<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI-News · 设计团队的 AI 资讯雷达</title>
    <link rel="icon" href="./assets/logo.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@500;600&family=Source+Serif+4:ital,opsz,wght@0,8..60,500;1,8..60,500;1,8..60,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/styles.css?v=waytoagi-source-summary-20260505" />
  </head>
  <body>
    <div class="grain" aria-hidden="true"></div>
    <main class="shell">
      <header class="hero">
        <div class="hero-grid">
          <div class="hero-left">
            <h1 class="hero-title" aria-label="AI-News · 设计团队的 AI 资讯雷达">
              <span class="title-ai">AI</span><span id="heroTypedTitle" class="title-type" data-texts='[" News", " 新闻"]'> News</span><span class="type-caret" aria-hidden="true">|</span>
            </h1>

            <p class="hero-time">
              <svg class="clock-icon" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="9" />
                <path d="M12 7v5l3 2" />
              </svg>
              <span id="updatedAt" aria-label="最近更新">加载中...</span>
            </p>

            <p class="hero-sub">每天扫一眼，看今天的 Agent、AI 模型和创作工具有哪些更新值得关注。</p>

            <div class="hero-search-block">
              <label class="hero-search" for="searchInput">
                <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <circle cx="11" cy="11" r="7" />
                  <path d="M16.5 16.5l4 4" />
                </svg>
                <input id="searchInput" type="search" placeholder="搜索 Agent / Skill / 模型 / 工具 / 来源" />
              </label>
              <div class="search-actions" aria-label="搜索模式">
                <div class="search-mode-switch">
                  <button id="searchNormalBtn" class="search-mode-btn active" type="button">普通搜索</button>
                  <button id="searchAiBtn" class="search-mode-btn" type="button">AI 精准筛选</button>
                </div>
                <button id="aiSettingsBtn" class="ai-settings-btn" type="button">AI 设置</button>
                <button id="aiSearchSubmit" class="ai-search-submit" type="button">筛选新闻</button>
              </div>
            </div>

            <div class="hero-modes">
              <span class="mode-label">浏览方式</span>
              <div class="mode-band">
                <div class="mode-switch">
                  <button id="modeAiBtn" class="mode-btn active" type="button">Agent 优先</button>
                  <button id="modeAllBtn" class="mode-btn" type="button">全量</button>
                </div>
                <span class="mode-hint" id="modeHint">Agent 优先</span>
              </div>
              <label id="allDedupeWrap" class="all-dedupe" for="allDedupeToggle">
                <input id="allDedupeToggle" type="checkbox" checked />
                <span class="all-dedupe-dot"></span>
                <span id="allDedupeLabel">去重开</span>
              </label>
            </div>

          </div>

        </div>

        <div class="paper-line" aria-hidden="true">
          <svg viewBox="0 0 1080 18" preserveAspectRatio="none">
            <path d="M2 10C86 7 174 12 260 9C360 5 454 13 548 9C652 4 750 14 846 8C936 3 1000 12 1078 7" />
          </svg>
        </div>
      </header>

      <section class="waytoagi-wrap">
        <div class="waytoagi-head">
          <h2>WaytoAGI 更新日志</h2>
          <div class="waytoagi-tools">
            <div class="waytoagi-switch">
              <button id="waytoagiTodayBtn" class="waytoagi-btn active" type="button">最近更新日</button>
              <button id="waytoagi7dBtn" class="waytoagi-btn" type="button">近7日</button>
            </div>
            <span id="waytoagiUpdatedAt">加载中...</span>
          </div>
        </div>
        <div id="waytoagiMeta" class="waytoagi-meta"></div>
        <div id="waytoagiList" class="waytoagi-list"></div>
      </section>

      <section class="list-wrap">
        <div class="list-sources">
          <span class="field-label">来源筛选</span>
          <select id="siteSelect" class="visually-hidden" aria-label="按站点筛选">
            <option value="">全部站点</option>
          </select>
          <section class="site-pills" id="sitePills" aria-label="来源快捷筛选"></section>
        </div>
        <div class="list-head">
          <h2 id="listTitle">Agent 重点更新</h2>
          <span id="resultCount">0 条</span>
        </div>
        <div id="newsList" class="news-list"></div>
      </section>

      <section class="status-board" aria-label="覆盖状态">
        <div class="section-kicker">
          <span>source notebook</span>
        </div>
        <section class="stats" id="stats"></section>
        <section class="coverage-strip" id="coverageStrip" aria-label="Source coverage status"></section>
      </section>

      <details class="advanced-panel">
        <summary>
          <span>高级筛选与源状态</span>
          <span class="advanced-summary" id="advancedSummary">加载中...</span>
        </summary>
        <div class="advanced-content">
          <div class="source-health" id="sourceHealth">源状态加载中...</div>
        </div>
      </details>
    </main>

    <template id="itemTpl">
      <article class="news-card">
        <div class="meta-row">
          <time class="time"></time>
          <span class="meta-dot" aria-hidden="true">·</span>
          <span class="source"></span>
        </div>
        <a class="title" target="_blank" rel="noopener noreferrer"></a>
        <p class="summary"></p>
      </article>
    </template>

    <div id="aiSettingsModal" class="ai-settings-modal" hidden>
      <section class="ai-settings-panel" role="dialog" aria-modal="true" aria-labelledby="aiSettingsTitle">
        <header class="ai-settings-head">
          <h2 id="aiSettingsTitle">AI 设置</h2>
          <button id="aiSettingsClose" class="ai-settings-close" type="button" aria-label="关闭设置">×</button>
        </header>
        <div class="ai-settings-body">
          <label class="ai-setting-field">
            <span>服务商</span>
            <select id="aiProviderSelect">
              <option value="glm">GLM / 智谱 BigModel</option>
            </select>
          </label>
          <label class="ai-setting-field">
            <span>API Key</span>
            <input id="aiApiKeyInput" type="password" autocomplete="off" placeholder="粘贴你的 BigModel API Key" />
          </label>
          <label class="ai-setting-field">
            <span>Base URL</span>
            <input id="aiBaseUrlInput" type="url" placeholder="https://open.bigmodel.cn/api/paas/v4/" />
          </label>
          <label class="ai-setting-field">
            <span>Model</span>
            <input id="aiModelInput" type="text" placeholder="glm-4-flash-250414" />
          </label>
          <a class="ai-settings-help" href="https://open.bigmodel.cn/usercenter/proj-mgmt/apikeys" target="_blank" rel="noopener noreferrer">查看申请教程</a>
          <p id="aiSettingsStatus" class="ai-settings-status" aria-live="polite"></p>
        </div>
        <footer class="ai-settings-actions">
          <button id="aiSettingsSave" class="ai-settings-save" type="button">保存</button>
          <button id="aiSettingsTest" class="ai-settings-test" type="button">测试连接</button>
        </footer>
      </section>
    </div>

    <script src="./assets/app.js?v=waytoagi-source-summary-20260505" defer></script>
  </body>
</html>
